<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCS — Saturation Study</title>
  <style>
:root{
  --bg:#0a0a0a; --surface:#141414; --surface2:#1e1e1e; --border:#2a2a2a;
  --text:#e0e0e0; --text-dim:#777; --gold:#c8a84e; --gold-dim:#8a7234;
  --green:#50c870; --red:#e05050; --radius:12px; --max-w:960px;
}
*{box-sizing:border-box}
body{
  background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  line-height:1.6; margin:0; padding:0 16px 40px;
}
header,main{max-width:var(--max-w); margin:0 auto}
header{padding:28px 0 18px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:flex-start; gap:16px}
h1{font-size:1.8rem; letter-spacing:-0.02em; margin:0}
h1 span{color:var(--gold)}
.tagline{color:var(--text-dim); margin-top:4px}
.card{
  background:var(--surface); border:1px solid var(--border); border-radius:16px;
  padding:24px; margin-top:28px;
}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.action{
  background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:20px;
}
.action h2{margin:0 0 8px;font-size:1.1rem}
.action p{margin:0 0 14px;color:var(--text-dim)}
.row{display:flex; gap:14px; align-items:center; flex-wrap:wrap; margin:14px 0}
.badge{display:inline-block; padding:4px 8px; border:1px solid var(--border); border-radius:999px; color:var(--text-dim); font-size:.8rem}
a.btn, button{
  background:var(--surface2); color:var(--text); border:1px solid var(--border);
  padding:10px 16px; border-radius:10px; cursor:pointer; font-size:.92rem; text-decoration:none; display:inline-block;
}
a.btn:hover, button:hover{border-color:var(--gold)}
a.primary{border-color:var(--gold); color:var(--gold)}
.lang-toggle{display:flex; gap:6px}
.lang-btn{padding:8px 12px; font-size:.82rem}
.lang-btn.active{border-color:var(--gold); color:var(--gold)}
.muted{color:var(--text-dim)}
@media (max-width:700px){
  header{flex-direction:column; align-items:flex-start}
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header>
  <div>
    <h1><span>SCS</span> — <span data-i18n="portalTitle"></span></h1>
    <p class="tagline" data-i18n="portalTagline"></p>
  </div>
  <div class="lang-toggle">
    <button class="lang-btn" data-lang="fr">FR</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>
</header>

<main>
  <div class="card">
    <div class="row">
      <span class="badge" data-i18n="connected"></span>
    </div>

    <div class="grid">
      <div class="action">
        <h2 data-i18n="participateTitle"></h2>
        <p data-i18n="participateDesc"></p>
        <a class="btn primary" href="participate.html" data-i18n="openParticipate"></a>
      </div>

      <div class="action">
        <h2 data-i18n="resultsTitle"></h2>
        <p data-i18n="resultsDesc"></p>
        <a class="btn" href="results.html" data-i18n="openResults"></a>
      </div>
    </div>
  </div>
</main>

<script src="config.js"></script>
<script src="i18n.js"></script>
<script>
if (!window.I18N) window.I18N = {fr:{},en:{}};

window.I18N.fr = Object.assign({}, window.I18N.fr || {}, {
  portalTitle: "Saturation Study",
  portalTagline: "Choisissez entre participer à l’étude ou consulter les résultats.",
  participateTitle: "Participer à l’étude",
  participateDesc: "Lancer une nouvelle session anonyme de l’étude sur la saturation idéale.",
  openParticipate: "Ouvrir l’étude",
  resultsTitle: "Consulter les résultats",
  resultsDesc: "Voir les sessions, les moyennes et les résultats agrégés.",
  openResults: "Ouvrir les résultats"
});

window.I18N.en = Object.assign({}, window.I18N.en || {}, {
  portalTitle: "Saturation Study",
  portalTagline: "Choose whether to participate in the study or consult the results.",
  participateTitle: "Participate in the study",
  participateDesc: "Launch a new anonymous session of the ideal saturation study.",
  openParticipate: "Open study",
  resultsTitle: "Consult results",
  resultsDesc: "View sessions, averages, and aggregated results.",
  openResults: "Open results"
});

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => applyLang(btn.dataset.lang));
});
applyLang(detectLang());
</script>
</body>
</html>
